name: Sync docs

on:
  schedule:
    - cron: "0 18 * * 6" # Runs 2:00 AM Sunday SGT (UTC+8)
  workflow_dispatch:
    inputs:
      force_resync:
        description: "Force full re-sync (clear manifest, treat all files as new)"
        required: false
        type: boolean
        default: false
      skip_pr:
        description: "Emergency: skip PR and embed directly to Pinecone"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  scrape-and-pr:
    if: ${{ inputs.skip_pr != true }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Clear manifest for force resync
        if: ${{ inputs.force_resync == true }}
        run: |
          echo "Force resync requested, removing manifest.json"
          rm -f manifest.json

      - name: Remove legacy frameworks folder
        run: |
          if [ -d "frameworks" ]; then
            echo "Removing legacy frameworks/ folder"
            rm -rf frameworks
          fi

      - name: Sync docs (scrape + diff, no embed)
        run: python scripts/sync.py --json-summary sync_summary.json

      - name: Check for changes
        id: changes
        run: |
          if [[ -n "$(git status --porcelain -- docs/ manifest.json)" ]]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No documentation changes detected."
          fi

      - name: Create branch and commit
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          BRANCH="sync/$(date +%Y-%m-%d)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add docs/ manifest.json
          git rm -r --cached frameworks 2>/dev/null || true
          COMMIT_MSG="chore: sync docs $(date +%Y-%m-%d)"
          if [ "${{ inputs.force_resync }}" == "true" ]; then
            COMMIT_MSG="chore: force sync docs $(date +%Y-%m-%d)"
          fi
          git commit -m "$COMMIT_MSG"
          git push --force origin "$BRANCH"
          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"

      - name: Tag sync
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          DATE_TAG="synced/$(date +%Y-%m-%d)"
          git tag -f "$DATE_TAG"
          git tag -f "latest-sync"
          git push origin "refs/tags/$DATE_TAG" --force
          git push origin refs/tags/latest-sync --force

      - name: Close existing sync PRs
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          OPEN_PRS=$(gh pr list --search "head:sync/" --state open --json number --jq '.[].number' 2>/dev/null || echo "")
          for pr in $OPEN_PRS; do
            echo "Closing superseded PR #$pr"
            gh pr close "$pr" --comment "Superseded by newer sync run."
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate PR body
        if: steps.changes.outputs.has_changes == 'true'
        run: python scripts/pr_summary.py sync_summary.json > pr_body.md

      - name: Open PR
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          TITLE="chore: sync docs $(date +%Y-%m-%d)"
          if [ "${{ inputs.force_resync }}" == "true" ]; then
            TITLE="[FORCE] chore: sync docs $(date +%Y-%m-%d)"
          fi
          gh pr create \
            --base master \
            --head "$BRANCH" \
            --title "$TITLE" \
            --body-file pr_body.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  force-embed-direct:
    if: ${{ inputs.skip_pr == true }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Clear manifest for force resync
        if: ${{ inputs.force_resync == true }}
        run: rm -f manifest.json

      - name: Remove legacy frameworks folder
        run: |
          if [ -d "frameworks" ]; then
            rm -rf frameworks
          fi

      - name: Sync and embed directly
        env:
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
          PINECONE_INDEX_NAME: ${{ secrets.PINECONE_INDEX_NAME }}
        run: |
          if [ "${{ inputs.force_resync }}" == "true" ]; then
            python scripts/sync.py --embed --force
          else
            python scripts/sync.py --embed
          fi

      - name: Commit changes
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add manifest.json docs/
            git rm -r --cached frameworks 2>/dev/null || true
            git commit -m "chore: force sync docs (direct embed)"
            git push
          fi
