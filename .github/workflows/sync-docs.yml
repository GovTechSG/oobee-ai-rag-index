name: Sync docs

on:
  schedule:
    - cron: "0 2 * * 1" # Runs 10:00 AM on Monday. UTC +8
  workflow_dispatch:
    inputs:
      pinecone_api_key:
        description: "Pinecone API key (optional, overrides secret)"
        required: false
        type: string
      pinecone_index_name:
        description: "Pinecone index name (optional, overrides secret)"
        required: false
        type: string
      force_resync:
        description: "Force full re-sync (ignore manifest, clear namespaces, re-upload all)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Clear manifest for force resync
        if: ${{ inputs.force_resync == true }}
        run: |
          echo "Force resync requested, removing manifest.json"
          rm -f manifest.json

      - name: Remove legacy frameworks folder
        run: |
          if [ -d "frameworks" ]; then
            echo "Removing legacy frameworks/ folder"
            rm -rf frameworks
          fi

      - name: Sync docs and embed
        env:
          PINECONE_API_KEY: ${{ inputs.pinecone_api_key || secrets.PINECONE_API_KEY }}
          PINECONE_INDEX_NAME: ${{ inputs.pinecone_index_name || secrets.PINECONE_INDEX_NAME }}
        run: |
          if [ "${{ inputs.force_resync }}" == "true" ]; then
            python scripts/sync.py --embed --force
          else
            python scripts/sync.py --embed
          fi

      - name: Commit changes
        shell: bash
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add manifest.json docs/
            git rm -r --cached frameworks 2>/dev/null || true
            git commit -m "chore: sync docs"
            git push
          else
            echo "No changes to commit."
          fi
