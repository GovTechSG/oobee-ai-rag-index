sources:
  react:
    repo: "https://github.com/reactjs/react.dev"
    docs_path: "src/content"
    extensions: [".md", ".mdx"]
    ignore: ["node_modules", ".github", "blog", "community", "errors", "warnings", "versions.md", "index.md", "tutorial-tic-tac-toe.md"]

  vue:
    repo: "https://github.com/vuejs/docs"
    docs_path: "src"
    extensions: [".md"]
    ignore: ["node_modules", ".github", ".vitepress", "partners", "sponsor", "translations", "ecosystem", "error-reference", "about", "tutorial", "style-guide", "examples"]

  angular:
    repo: "https://github.com/angular/angular"
    docs_path: "adev/src/content"
    extensions: [".md"]
    ignore: ["node_modules", ".github", "examples", "ecosystem", "events", "ai", "tutorials", "tools", "kitchen-sink.md", "error.md"]

  javascript:
    repo: "https://github.com/mdn/content"
    docs_path: "files/en-us/web/javascript"
    extensions: [".md"]
    ignore: ["node_modules", ".github", "temporal", "escape", "unescape", "with", "atomics", "asyncdisposablestack", "disposablestack", "weakref", "finalizationregistry"]
    output_dir: "docs/languages"

  typescript:
    repo: "https://github.com/microsoft/TypeScript-Website"
    docs_path: "packages/documentation/copy/en"
    extensions: [".md"]
    ignore: ["node_modules", ".github", "release-notes", "handbook-v1", "Nightly Builds.md", "diagrams"]
    output_dir: "docs/languages"

output:
  base_dir: "docs/frameworks"

# Static reference files (downloaded, not scraped from git)
static_sources:
  wcag:
    url: "https://www.w3.org/WAI/WCAG22/wcag.json"
    local_path: "wcag.json"
    description: "WCAG 2.2 success criteria with explanations and techniques"

embedding:
  chunk_size: 500 # characters per chunk
  chunk_overlap: 100 # character overlap between chunks
  header_level: 2 # split sections on headings at this level or deeper

vector_db:
  provider: "pinecone"
  index_name: "" # optional; prefer env PINECONE_INDEX_NAME or VECTOR_DB_INDEX_NAME
  namespace: "" # optional default namespace
  namespace_template: "{framework}-docs" # optional per-framework namespace
